<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-sm">
        <div class="card-header bg-warning text-dark">
          <h5 class="mb-0">Nouveau paiement</h5>
        </div>
        <div class="card-body">

          <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show">
            {{ successMessage }}
            <button type="button" class="btn-close" (click)="successMessage = ''"></button>
          </div>
          <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show">
            {{ errorMessage }}
            <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
          </div>

          <div class="mb-3">
            <label class="form-label">ID du contrat</label>
            <input type="number" class="form-control"
                   [(ngModel)]="paiement.contratId"
                   placeholder="ex: 1" />
          </div>

          <div class="mb-3">
            <label class="form-label">Montant (MAD)</label>
            <div class="input-group">
              <input type="number" class="form-control"
                     [(ngModel)]="paiement.montant"
                     placeholder="ex: 500" />
              <span class="input-group-text">MAD</span>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Date de paiement</label>
            <input type="date" class="form-control"
                   [(ngModel)]="paiement.datePaiement" />
          </div>

          <div class="mb-3">
            <label class="form-label">Type de paiement</label>
            <select class="form-select" [(ngModel)]="paiement.typePaiement">
              <option value="VIREMENT">Virement bancaire</option>
              <option value="CHEQUE">Chèque</option>
              <option value="ESPECES">Espèces</option>
              <option value="CARTE">Carte bancaire</option>
            </select>
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-warning" (click)="savePaiement()" [disabled]="isLoading">
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-1"></span>
              Enregistrer le paiement
            </button>
            <button class="btn btn-outline-secondary" routerLink="/paiements">Annuler</button>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
